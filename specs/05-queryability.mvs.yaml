name: queryability_smoke

connections:
  target: { engine: bigquery }

migration:
  steps:
    - { kind: ddl, sql: bigquery/ddl/staging.sql }
    - { kind: ddl, sql: bigquery/ddl/ods.sql }
    - { kind: ddl, sql: bigquery/ddl/dm.sql }

suites:
  # =========================================================================
  # AC6 + AC8: Queryability smoke — SELECT * LIMIT 0 on every object plus
  # 3 representative cross-table queries. All produce live run timestamps.
  # Any failure to execute surfaces as ERROR (mode: measure never gates,
  # but a query that cannot run raises an engine error → suite ERROR).
  # =========================================================================
  - pattern: query_performance
    id: queryability-smoke
    target_dataset: "${BUILD_DATASET}"
    queries:
      - id: smoke-stg_crm_client
        mode: measure
        sql: "SELECT * FROM ${BUILD_DATASET}.stg_crm_client LIMIT 0"
