      - id: smoke-staging-filter
        mode: measure
        sql: "SELECT * FROM ${BUILD_DATASET}.stg_tel_call WHERE load_date = DATE '2026-01-01' LIMIT 10"
      - id: smoke-ods-join
        mode: measure
        sql: "SELECT c.call_id, q.queue_name FROM ${BUILD_DATASET}.ods_call c JOIN ${BUILD_DATASET}.ods_queue q ON c.queue_id = q.queue_id LIMIT 10"
      - id: smoke-dm-join
        mode: measure
        sql: "SELECT f.interaction_id, a.full_name, p.program_name FROM ${BUILD_DATASET}.fact_interaction f JOIN ${BUILD_DATASET}.dim_agent a ON f.agent_sk = a.agent_sk JOIN ${BUILD_DATASET}.dim_program p ON f.program_sk = p.program_sk WHERE f.event_date = DATE '2026-01-01' LIMIT 10"
