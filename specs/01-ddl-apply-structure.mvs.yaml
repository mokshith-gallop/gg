name: ddl_apply_structure

connections:
  target: { engine: bigquery }

migration:
  steps:
    - { kind: ddl, sql: bigquery/ddl/staging.sql }
    - { kind: ddl, sql: bigquery/ddl/ods.sql }
    - { kind: ddl, sql: bigquery/ddl/dm.sql }

suites:
  - pattern: schema_conformance
    id: ddl-apply-structure
    target_dataset: "${BUILD_DATASET}"
    expect_table_count: 100
    tables:
      - table: stg_crm_client
        expect_object_type: TABLE
        columns:
          - { name: client_id, type: INT64 }
          - { name: client_code, type: STRING }
          - { name: client_name, type: STRING }
          - { name: industry, type: STRING }
          - { name: hq_country, type: STRING }
          - { name: status, type: STRING }
          - { name: created_ts, type: INT64, description: 'epoch SECONDS (legacy)' }
          - { name: updated_ts, type: INT64, description: 'epoch SECONDS (legacy)' }
          - { name: load_date, type: DATE }
      - table: stg_crm_client_contact
        expect_object_type: TABLE
        columns:
          - { name: contact_id, type: INT64 }
          - { name: client_id, type: INT64 }
          - { name: full_name, type: STRING }
          - { name: email, type: STRING }
          - { name: phone, type: STRING }
          - { name: role, type: STRING }
          - { name: is_primary, type: BOOL }
          - { name: created_ts, type: INT64, description: 'epoch SECONDS (legacy)' }
          - { name: load_date, type: DATE }
      - table: stg_crm_program
        expect_object_type: TABLE
        columns:
          - { name: program_id, type: INT64 }
          - { name: client_id, type: INT64 }
          - { name: program_code, type: STRING }
          - { name: program_name, type: STRING }
          - { name: line_of_business, type: STRING }
          - { name: channel_mix, type: STRING }
          - { name: site_code, type: STRING }
          - { name: status, type: STRING }
          - { name: go_live_ts, type: INT64, description: 'epoch SECONDS (legacy)' }
          - { name: updated_ts, type: INT64, description: 'epoch SECONDS (legacy)' }
          - { name: load_date, type: DATE }
      - table: stg_crm_contract
        expect_object_type: TABLE
        columns:
          - { name: contract_id, type: INT64 }
          - { name: client_id, type: INT64 }
          - { name: program_id, type: INT64 }
          - { name: contract_no, type: STRING }
          - { name: start_dt, type: STRING, description: 'Oracle string YYYYMMDDHH24MISS (legacy)' }
          - { name: end_dt, type: STRING, description: 'Oracle string YYYYMMDDHH24MISS (legacy)' }
